<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Verification | NXTSYNC</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* 🔵 ANIMATED WATERMARK */
        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 500px;
            opacity: 0.10;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            animation: floatDiagonal 6s ease-in-out infinite;
        }

        @keyframes floatDiagonal {
            0%, 100% { transform: translate(-50%, -50%) rotate(0deg); opacity: 0.10; }
            25% { transform: translate(-45%, -55%) rotate(5deg); opacity: 0.14; }
            50% { transform: translate(-55%, -45%) rotate(-5deg); opacity: 0.12; }
            75% { transform: translate(-48%, -52%) rotate(3deg); opacity: 0.15; }
        }

        body {
            margin: 0;
            background-image: url("https://static.vecteezy.com/system/resources/previews/030/671/300/large_2x/navy-blue-background-high-quality-free-photo.jpg");
            font-family: "Poppins", sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            padding: 40px 10px;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 900px;
            background-image: url("https://cdn.photoroom.com/v1/assets-cached.jpg?path=backgrounds_v3/white/Photoroom_white_background_extremely_fine_texture_only_white_co_b923d1bf-f41f-4fe1-993c-1c75fb26b8d4.jpg");
            color: #222;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .logo-top { text-align: left; margin-bottom: 15px; }

        h1 {
            font-size: 34px;
            color: #0f4c75;
            font-weight: 800;
            margin-bottom: 25px;
            padding: 12px 25px;
            border: 3px solid #0f4c75;
            display: inline-block;
            border-radius: 12px;
            background: rgba(15, 76, 117, 0.08);
        }

        .logo-vertical {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin-bottom: 30px;
        }

        .logo-vertical img {
            height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2));
        }

        .info-box {
            background: #eef4f6;
            padding: 20px;
            border-radius: 12px;
            width: 85%;
            margin: auto;
            text-align: center;
            font-size: 18px;
            border: 1px solid #dce3e6;
        }

        .info-box p { margin: 10px 0; font-weight: 600; color: #333; }
        .info-box b { color: #0f4c75; }

        .certificate-wrapper {
            width: 100%;
            max-width: 800px;
            height: 560px;
            margin: 30px auto;
            border-radius: 14px;
            border: 4px solid #0f4c75;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        #cert-frame { width: 100%; height: 100%; border: none; }

        .footer {
            margin-top: 40px;
            background: #0f4c75;
            color: #fff;
            padding: 30px;
            border-radius: 14px;
        }

        .footer-icons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .footer-icons a {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #fff;
            font-size: 0.9rem;
            gap: 10px;
        }

        .footer-icons img { width: 24px; height: 24px; }
        
        .loading-overlay { color: #0f4c75; font-weight: bold; padding: 50px; }
    </style>
</head>
<body>

<img src="https://res.cloudinary.com/dpuo8rzhe/image/upload/v1749635641/NS_NEW_LOGO-removebg-preview_qm2kh5.png" class="watermark" alt="Watermark">

<div class="container">
    <div class="logo-top">
        <img src="https://res.cloudinary.com/dpuo8rzhe/image/upload/v1749635641/NS_NEW_LOGO-removebg-preview_qm2kh5.png" alt="Company Logo" width="180px">
    </div>

    <h1>CERTIFICATE VERIFICATION</h1>

    <div class="logo-vertical">
        <img src="https://soundsory.com/wp-content/uploads/2023/09/ISO_9001_logo.png" alt="ISO Logo">
        <img src="https://vectorseek.com/wp-content/uploads/2023/09/AICTE-Logo-Vector.svg-.png" alt="AICTE Logo">
    </div>

    <div class="info-box" id="details-content">
        <div class="loading-overlay">Verifying Credentials...</div>
    </div>

    <div class="certificate-wrapper">
        <iframe id="cert-frame"></iframe>
    </div>

    <div class="footer">
        <div class="footer-icons">
            <a href="mailto:hrnxtsync@gmail.com">
                <img src="https://cdn-icons-png.flaticon.com/512/732/732200.png" alt="Email">
                <strong>hrnxtsync@gmail.com</strong>
            </a> 
            <a href="https://nxtsync.in/" target="_blank">
                <img src="https://cdn-icons-png.flaticon.com/512/1055/1055666.png" alt="Website">
                <strong>https://nxtsync.in/</strong>
            </a>
        </div>
        <p style="font-size: 0.85rem; opacity: 0.8; margin-top: 15px;">© 2026 NxtSync Pvt. Ltd</p>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const certId = params.get('id');

    async function verifyAndLoad() {
        const detailsBox = document.getElementById('details-content');
        const pdfFrame = document.getElementById('cert-frame');

        if (!certId) {
            detailsBox.innerHTML = "<p style='color:red;'>No Certificate ID Provided</p>";
            return;
        }

        try {
            const response = await fetch(`/api/certificate/verify/${certId}`);
            const data = await response.json();

            // Inside your verify.html <script>
if (response.ok) {
    detailsBox.innerHTML = `
        <p><b>STUDENT NAME:</b> ${data.student.toUpperCase()}</p>
        <p><b>COURSE DOMAIN:</b> ${data.course.toUpperCase()}</p>
        <p><b>ISSUE DATE:</b> ${new Date(data.issueDate).toLocaleDateString('en-GB')}</p>
    `;

    const pdfUrl = data.certificateUrl; 
    const pdfFrame = document.getElementById('cert-frame');
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    if (isMobile) {
        // Use Google Docs Viewer for mobile to prevent auto-download
        pdfFrame.src = `https://docs.google.com/viewer?url=${encodeURIComponent(pdfUrl)}&embedded=true`;
    } else {
        // Load directly for laptops
        pdfFrame.src = `${pdfUrl}#toolbar=0&navpanes=0&scrollbar=0`;
    }
}else {
                detailsBox.innerHTML = `<p style="color:red;"><b>Verification Failed:</b> ${data.message}</p>`;
            }
        } catch (err) {
            detailsBox.innerHTML = "<p>Service Unavailable. Please try again later.</p>";
        }
    }
    verifyAndLoad();
</script>
</body>
</html>
